<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>BremLogic</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0c1118;
        color: #f4f7fb;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at top, rgba(42, 120, 212, 0.28), transparent 48%),
          radial-gradient(circle at bottom, rgba(193, 118, 46, 0.2), transparent 40%),
          #0c1118;
      }

      main {
        width: min(28rem, calc(100vw - 2rem));
        padding: 1.25rem;
        border: 1px solid rgba(116, 149, 186, 0.3);
        border-radius: 1.25rem;
        background: rgba(14, 22, 33, 0.94);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 0.5rem;
        font-size: 1.35rem;
      }

      p {
        margin: 0;
        line-height: 1.55;
        color: rgba(234, 242, 249, 0.82);
      }
    </style>
  </head>
  <body>
    <main>
      <h1>BremLogic is loading</h1>
      <p>
        This iOS shell points to the live Signals Bot dashboard at
        <strong>app.bremlogic.com</strong>. If the network is unavailable, reopen
        the app once connectivity returns.
      </p>
    </main>
  </body>
</html>
