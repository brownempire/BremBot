name: Push Signal Scan

on:
  schedule:
    # GitHub Actions supports minimum 5-minute cron cadence.
    - cron: "*/.1 * * * *"
  workflow_dispatch:

jobs:
  trigger-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Validate required secrets
        env:
          SIGNAL_SCAN_URL: ${{ secrets.SIGNAL_SCAN_URL }}
        run: |
          if [ -z "$SIGNAL_SCAN_URL" ]; then
            echo "Missing SIGNAL_SCAN_URL secret"
            exit 1
          fi

      - name: Trigger push signal scan
        env:
          SIGNAL_SCAN_URL: ${{ secrets.SIGNAL_SCAN_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -euo pipefail
          AUTH_HEADER=""
          if [ -n "${CRON_SECRET:-}" ]; then
            AUTH_HEADER="Authorization: Bearer ${CRON_SECRET}"
          fi

          if [ -n "$AUTH_HEADER" ]; then
            RESPONSE=$(curl -sS -L -w "\n%{http_code}" -H "$AUTH_HEADER" "$SIGNAL_SCAN_URL")
          else
            RESPONSE=$(curl -sS -L -w "\n%{http_code}" "$SIGNAL_SCAN_URL")
          fi

          BODY=$(echo "$RESPONSE" | sed '$d')
          STATUS=$(echo "$RESPONSE" | tail -n1)
          echo "Status: $STATUS"
          echo "Body: $BODY"

          if [ "$STATUS" -lt 200 ] || [ "$STATUS" -ge 300 ]; then
            exit 1
          fi
