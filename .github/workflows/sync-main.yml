name: Sync work into main

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: "Branch to merge from"
        required: true
        default: "work"
      target_branch:
        description: "Branch to merge into"
        required: true
        default: "main"
      sync_source_to_target_tip:
        description: "Also move source branch to the merged target tip"
        required: true
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Merge source into target
        env:
          SOURCE_BRANCH: ${{ github.event.inputs.source_branch }}
          TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
        run: |
          set -euo pipefail

          git fetch origin "$SOURCE_BRANCH" "$TARGET_BRANCH"
          git checkout -B "$TARGET_BRANCH" "origin/$TARGET_BRANCH"

          if git merge-base --is-ancestor "origin/$SOURCE_BRANCH" HEAD; then
            echo "No merge needed: $SOURCE_BRANCH is already in $TARGET_BRANCH"
          else
            git merge --no-ff "origin/$SOURCE_BRANCH" -m "Merge branch '$SOURCE_BRANCH' into $TARGET_BRANCH (GitHub Actions)"
            git push origin "HEAD:$TARGET_BRANCH"
          fi

      - name: Optionally sync source branch to merged target tip
        if: ${{ github.event.inputs.sync_source_to_target_tip == 'true' }}
        env:
          SOURCE_BRANCH: ${{ github.event.inputs.source_branch }}
          TARGET_BRANCH: ${{ github.event.inputs.target_branch }}
        run: |
          set -euo pipefail
          git checkout "$TARGET_BRANCH"
          git push origin "HEAD:$SOURCE_BRANCH"
